<html lang="zh-CN">
<head>
    <meta charset="UTF-8">

    <title>考研择校PPT可视化预览</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            background: #1a1a2e;
            min-height: 100vh;
            overflow-x: hidden;
        }
        .slide-container {
            width: 1440px;
            height: 810px;
            margin: 0 auto 40px;
            position: relative;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            transform-origin: top center;
        }
        .slide-number {
            position: absolute;
            top: 15px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            z-index: 100;
        }
        .controls {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            padding: 12px 24px;
            border-radius: 30px;
            display: flex;
            gap: 15px;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }
        .controls button {
            background: #4a5568;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        .controls button:hover { background: #667eea; }
        .controls .scale-info { color: #a0aec0; font-size: 13px; min-width: 60px; text-align: center; }
        .nav-dots {
            position: fixed;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 1000;
        }
        .nav-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            cursor: pointer;
            transition: all 0.3s;
        }
        .nav-dot.active { background: #667eea; transform: scale(1.3); }
        .nav-dot:hover { background: #667eea; }
        .thumbnail-bar {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            padding: 10px;
            background: rgba(0,0,0,0.7);
            border-radius: 12px;
            overflow-x: auto;
            max-width: 90vw;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }
        .thumbnail {
            width: 120px;
            height: 68px;
            background: white;
            border-radius: 6px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.3s;
            flex-shrink: 0;
            overflow: hidden;
            position: relative;
        }
        .thumbnail.active { border-color: #667eea; }
        .thumbnail:hover { transform: scale(1.05); }
        .thumbnail-number {
            position: absolute;
            bottom: 2px;
            right: 4px;
            font-size: 10px;
            color: #666;
            background: rgba(255,255,255,0.9);
            padding: 1px 4px;
            border-radius: 3px;
        }
        #slides-wrapper { padding: 40px 20px 150px; transition: transform 0.3s ease; }
        .loading { text-align: center; color: white; padding: 50px; font-size: 18px; }
        .title-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 12px 24px;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
        }
        .title-bar h1 { font-size: 18px; font-weight: 600; }
        .title-bar .slide-count { font-size: 14px; color: #a0aec0; }
    </style>
</head>
<body>
    <div class="title-bar">
        <h1>考研择校PPT可视化预览</h1>
        <span class="slide-count">共 <span id="total-slides">23</span> 张幻灯片</span>
    </div>
    <div id="slides-wrapper"><div class="loading">正在加载幻灯片...</div></div>
    <div class="thumbnail-bar" id="thumbnail-bar"></div>
    <div class="controls">
        <button onclick="changeScale(-0.1)">缩小</button>
        <span class="scale-info" id="scale-info">100%</span>
        <button onclick="changeScale(0.1)">放大</button>
        <button onclick="fitToScreen()">适应屏幕</button>
        <button onclick="scrollToSlide(0)">首页</button>
        <button onclick="scrollToSlide(currentSlideIndex - 1)">上一张</button>
        <button onclick="scrollToSlide(currentSlideIndex + 1)">下一张</button>
        <button onclick="scrollToSlide(totalSlides - 1)">末页</button>
    </div>
    <div class="nav-dots" id="nav-dots"></div>
    <script>
        window.slideDataMap = new Map();
        let currentScale = 0.55;
        let currentSlideIndex = 0;
        let totalSlides = 23;
        function renderSlides() {
            const wrapper = document.getElementById('slides-wrapper');
            const thumbnailBar = document.getElementById('thumbnail-bar');
            const navDots = document.getElementById('nav-dots');
            wrapper.innerHTML = '';
            thumbnailBar.innerHTML = '';
            navDots.innerHTML = '';
            for (let i = 1; i <= totalSlides; i++) {
                const slideHtml = window.slideDataMap.get(i);
                if (!slideHtml) continue;
                const slideDiv = document.createElement('div');
                slideDiv.className = 'slide-container';
                slideDiv.id = 'slide-' + i;
                slideDiv.innerHTML = '<div class="slide-number">' + i + ' / ' + totalSlides + '</div>' + slideHtml;
                wrapper.appendChild(slideDiv);
                const thumb = document.createElement('div');
                thumb.className = 'thumbnail';
                thumb.id = 'thumb-' + i;
                thumb.onclick = function() { scrollToSlide(i - 1); };
                thumb.innerHTML = '<div class="thumbnail-number">' + i + '</div>';
                const thumbContent = document.createElement('div');
                thumbContent.style.cssText = 'transform: scale(0.083); transform-origin: top left; width: 1440px; height: 810px; overflow: hidden;';
                thumbContent.innerHTML = slideHtml;
                thumb.appendChild(thumbContent);
                thumbnailBar.appendChild(thumb);
                const dot = document.createElement('div');
                dot.className = 'nav-dot';
                dot.id = 'dot-' + i;
                dot.onclick = function() { scrollToSlide(i - 1); };
                navDots.appendChild(dot);
            }
            updateScale();
            updateActiveStates();
        }
        function updateScale() {
            document.getElementById('slides-wrapper').style.transform = 'scale(' + currentScale + ')';
            document.getElementById('slides-wrapper').style.transformOrigin = 'top center';
            document.getElementById('scale-info').textContent = Math.round(currentScale * 100) + '%';
        }
        function changeScale(delta) {
            currentScale = Math.max(0.2, Math.min(1.5, currentScale + delta));
            updateScale();
        }
        function fitToScreen() {
            currentScale = (window.innerWidth - 60) / 1440;
            updateScale();
        }
        function scrollToSlide(index) {
            index = Math.max(0, Math.min(totalSlides - 1, index));
            currentSlideIndex = index;
            const slide = document.getElementById('slide-' + (index + 1));
            if (slide) { slide.scrollIntoView({ behavior: 'smooth', block: 'start' }); }
            updateActiveStates();
        }
        function updateActiveStates() {
            for (let i = 1; i <= totalSlides; i++) {
                const thumb = document.getElementById('thumb-' + i);
                const dot = document.getElementById('dot-' + i);
                if (thumb) thumb.classList.toggle('active', i === currentSlideIndex + 1);
                if (dot) dot.classList.toggle('active', i === currentSlideIndex + 1);
            }
        }
        let scrollTimeout;
        window.addEventListener('scroll', function() {
            clearTimeout(scrollTimeout);
            scrollTimeout = setTimeout(function() {
                const slides = document.querySelectorAll('.slide-container');
                slides.forEach(function(slide, idx) {
                    const rect = slide.getBoundingClientRect();
                    if (rect.top + rect.height / 2 > 0 && rect.top + rect.height / 2 < window.innerHeight) {
                        currentSlideIndex = idx;
                        updateActiveStates();
                    }
                });
            }, 100);
        });
        document.addEventListener('keydown', function(e) {
            if (e.key === 'ArrowDown' || e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); scrollToSlide(currentSlideIndex + 1); }
            else if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') { e.preventDefault(); scrollToSlide(currentSlideIndex - 1); }
            else if (e.key === 'Home') { e.preventDefault(); scrollToSlide(0); }
            else if (e.key === 'End') { e.preventDefault(); scrollToSlide(totalSlides - 1); }
        });
        window.addEventListener('load', function() { setTimeout(fitToScreen, 100); setTimeout(renderSlides, 100); });
    </script>
